name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry-run:
        description: 'Dry run (skip npm publish)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx tsc --build --force && cp packages/core/src/schema.sql packages/core/dist/

      - name: Typecheck
        run: npm run typecheck

      - name: Run Tests
        run: npx vitest run

      - name: Bump versions
        id: version
        run: |
          BUMP=${{ inputs.bump }}

          # Get current version from root package.json
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          # Compute next version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

          # Update all package versions
          npm version "$NEXT" --no-git-tag-version --workspaces --include-workspace-root

      - name: Commit version bump
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git add -A
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"

      - name: Push tag and commit
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git push origin HEAD
          git push origin "v${VERSION}"

      - name: Publish @nirnex/core
        if: ${{ !inputs.dry-run }}
        run: npm publish --workspace packages/core --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nirnex/parser
        if: ${{ !inputs.dry-run }}
        run: npm publish --workspace packages/parser --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nirnex/hooks
        if: ${{ !inputs.dry-run }}
        run: npm publish --workspace packages/hooks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @nirnex/cli
        if: ${{ !inputs.dry-run }}
        run: npm publish --workspace packages/cli --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes
