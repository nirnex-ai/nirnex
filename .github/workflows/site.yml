name: Deploy Site

on:
  push:
    branches: ["nirnex-site"]
    paths:
      - "site/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel in-progress builds on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: nirnex-site

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Typecheck
        working-directory: site
        run: npm run typecheck

      - name: Cache Docusaurus build
        uses: actions/cache@v4
        with:
          path: site/.docusaurus
          key: docusaurus-${{ runner.os }}-${{ hashFiles('site/docs/**', 'site/src/**', 'site/docusaurus.config.ts', 'site/sidebars.ts') }}
          restore-keys: |
            docusaurus-${{ runner.os }}-

      - name: Build Docusaurus site
        working-directory: site
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
